<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Cookie Clicker Style Game</title>\n    <style>\n        body {\n            font-family: 'Arial', sans-serif;\n            background-color: #0d0d0d;  /* Dark background for cyberpunk theme */\n            color: #ffffff;  /* Light text for contrast */\n            margin: 0;\n            padding: 0;\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n        }\n        .tabs {\n            margin: 20px;\n        }\n        .tab {\n            display: inline-block;\n            padding: 10px 20px;\n            margin: 5px;\n            background-color: #333;\n            border: 1px solid #555;\n            cursor: pointer;\n        }\n        .tab:hover {\n            background-color: #555;\n        }\n        #clicker {\n            margin: 20px;\n            padding: 20px;\n            font-size: 24px;\n            background-color: #007bff;\n            color: white;\n            border: none;\n            border-radius: 5px;\n            cursor: pointer;\n            transition: background-color 0.3s;\n        }\n        #clicker:hover {\n            background-color: #0056b3;\n        }\n    </style>\n</head>\n<body>\n    <div class="tabs">\n        <div class="tab" onclick="showTab('generator')">Generator</div>\n        <div class="tab" onclick="showTab('buildings')">Buildings</div>\n        <div class="tab" onclick="showTab('upgrades')">Upgrades</div>\n        <div class="tab" onclick="showTab('statistics')">Statistics</div>\n        <div class="tab" onclick="showTab('special')">Special</div>\n    </div>\n    <button id="clicker">Click the Galaxy!</button>\n    <script>\n        function showTab(tabName) {\n            alert('Show content for ' + tabName);  // Placeholder for tab content\n        }\n    </script>\n</body>\n</html>
